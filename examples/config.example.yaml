# Morning Paper example configuration

name: Morning Paper
timezone: America/Los_Angeles
profile: |
  Add a short note about who this paper is for and what should matter most.
  Example: early-stage AI tools, operator software, media, and founder signal.
article_extractor: jina

sources:
  hacker_news:
    enabled: true
    limit: 20
  rss:
    - name: Simon Willison
      url: https://simonwillison.net/atom/everything/
      limit: 5
    - name: Lenny's Newsletter
      url: https://www.lennysnewsletter.com/feed
      limit: 5

outputs:
  directory: ~/.local/share/morning-paper
  renderer: typewriter
  pdf: true
  html: true
  markdown: true
  json: true
