name: Feature Request
description: Suggest a feature for Morning Paper
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or frustration.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like?
      description: Describe the feature or behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New source plugin
        - CLI command
        - Rendering / PDF output
        - Configuration
        - Documentation
        - Other
