name: Bug Report
description: Report a bug in Morning Paper
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1. Run `morning-paper ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Morning Paper version
      description: Output of pip show morning-paper
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of python --version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., macOS 15.4, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or tracebacks.
      render: shell
